name: CI

on:
  push:
    branches: [main, master]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: WireSentinel-Anonymity

      - name: Checkout WireSentinel (shared-types)
        uses: actions/checkout@v4
        with:
          repository: zerofrip/WireSentinel
          path: WireSentinel

      - name: Checkout WireSentinel-Mixnet
        uses: actions/checkout@v4
        with:
          repository: zerofrip/WireSentinel-Mixnet
          path: WireSentinel-Mixnet

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: WireSentinel-Anonymity

      - name: Run workspace tests
        working-directory: WireSentinel-Anonymity
        run: cargo test --workspace
